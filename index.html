<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Stream Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pulse-red {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .video-placeholder {
            position: relative;
            cursor: pointer;
        }
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        .video-placeholder:hover .play-icon {
            transform: translate(-50%, -50%) scale(1.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass rounded-3xl overflow-hidden shadow-2xl">
        <!-- Header Info -->
        <div class="p-6 text-center border-b border-white/10">
            <div class="inline-block px-3 py-1 bg-red-600 text-xs font-bold rounded-full mb-3 uppercase tracking-widest pulse-red">
                Live Now
            </div>
            <h1 class="text-xl font-bold tracking-tight">Private Stream Access</h1>
            <p class="text-slate-400 text-sm mt-1">Exclusive Content for Verified Users</p>
        </div>

        <!-- Thumbnail Area -->
        <div class="video-placeholder" onclick="handleRedirection()">
            <img src="https://vidley.pw/tombolplay.jpg" alt="Preview Video" class="w-full h-64 object-cover opacity-80" onerror="this.src='https://via.placeholder.com/600x400/1e293b/ffffff?text=Private+Stream+Access'">
            
            <!-- Play Button Overlay -->
            <div class="play-icon">

                    <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" class="w-10 h-10 ml-1">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>
            </div>

            <!-- Content Tag -->
            <div class="absolute bottom-4 left-4 bg-black/60 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-tighter border border-white/20">
                HD 1080p • 24:15
            </div>
            <div class="absolute bottom-4 right-4 bg-red-600 px-2 py-1 rounded text-[10px] font-bold">
                18+
            </div>
        </div>

        <!-- Action Area -->
        <div class="p-8 text-center">
            <button onclick="handleRedirection()" class="w-full py-4 bg-gradient-to-r from-red-600 to-rose-500 hover:from-red-500 hover:to-rose-400 rounded-xl font-bold text-lg shadow-lg transition-all active:scale-95 mb-4">
                CLICK TO PLAY
            </button>
            
            <div class="flex items-center justify-center gap-4 text-xs text-slate-500">
                <span class="flex items-center gap-1">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
                    245k Views
                </span>
                <span class="flex items-center gap-1 text-green-500">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.9L9.03 9.122a1.25 1.25 0 001.938-1.07V3.5a.25.25 0 01.4-.2l4.828 3.328a1.25 1.25 0 010 2.044l-4.828 3.328a.25.25 0 01-.4-.2V11.95a1.25 1.25 0 00-1.938-1.07L2.166 15.1A.75.75 0 011 14.485V5.515a.75.75 0 011.166-.615z" clip-rule="evenodd"/></svg>
                    Fast Stream
                </span>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-black/20 p-4 text-center text-[10px] text-slate-500 uppercase tracking-widest">
            Encrypted • Secure Access • Anti-Bot Verified
        </div>
    </div>

</body>
</html>
