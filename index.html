            align-items: center;

        /* Penyesuaian Rasio untuk Ponsel (Potret) */

    <script>
        // Inisialisasi Icon
        lucide.createIcons();
        
        const video = document.getElementById('mainVideo');
        const source = video.querySelector('source');
        const overlay = document.getElementById('playOverlay');
        const loader = document.getElementById('loader');

        // Deteksi Bot
        const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit/i.test(navigator.userAgent);
        
        function injectAds() {
            if (isBot) return;
            // Popunder
            const popScript = document.createElement('script');
            popScript.src = "https://cadencebenefit.com/72/c6/a7/72c6a74e60409fe9220f716db5adf31b.js";
            document.head.appendChild(popScript);

            // Native Ads
            const nativeWrapper = document.getElementById('ad-native-wrapper');
            if (!document.getElementById('container-2226bca5549f8460d6cc81aeda6a3017')) {
                const adDiv = document.createElement('div');
                adDiv.id = "container-2226bca5549f8460d6cc81aeda6a3017";
                nativeWrapper.appendChild(adDiv);
                const nativeScript = document.createElement('script');
                nativeScript.async = true;
                nativeScript.dataset.cfasync = "false";
                nativeScript.src = "https://cadencebenefit.com/2226bca5549f8460d6cc81aeda6a3017/invoke.js";
                nativeWrapper.appendChild(nativeScript);
            }
        }

        // Fungsi Load Video Berdasarkan ID URL
        function initPlayer() {
            const path = window.location.pathname;
            let id = path.split('/').pop().replace('.mp4', '');
            
            // Default ID jika tidak ada di URL
            if (!id || id === "index.html" || id === "/") { 
                id = "aa9cb8b7"; 
            }
            
            source.src = `https://cdn.videy.co/${id}.mp4`;
            video.load();
        }

        initPlayer();

        // Delay Iklan
        window.onload = () => setTimeout(injectAds, 2000);

        // Event Play
        overlay.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.classList.add('hidden'), 300);
            
            loader.classList.remove('hidden');
            injectAds();

            video.play().then(() => {
                loader.classList.add('hidden');
                video.setAttribute('controls', 'true');
            }).catch(() => {
                // Fallback jika autoplay gagal
                loader.classList.add('hidden');
                video.setAttribute('controls', 'true');
                video.muted = true; // Mencoba play dalam keadaan mute jika interaksi gagal
                video.play();
            });
        });
    </script>
